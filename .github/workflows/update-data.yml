name: Update market data

on:
  schedule:
    # 19:30 IST (14:00 UTC) Mon-Fri, after exchange EOD files publish
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "Backfill this many calendar days (0 = normal daily run)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Fetch data
        run: |
          DAYS="${{ github.event.inputs.backfill_days || '0' }}"
          if [ "$DAYS" != "0" ]; then
            python pipeline/update.py --backfill "$DAYS"
          else
            python pipeline/update.py
          fi

      - name: Commit updated data
        run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add site/data
          git diff --cached --quiet || git commit -m "data: $(date -u +%F)"
          git push
