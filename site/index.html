<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSE brAIn agent · Business Research AI Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#070b16;--panel:#0e1730;--panel2:#152048;--text:#eaf0ff;--muted:#8394bd;
--nse:#22e58a;--rival:#4f8ef7;--warn:#f5b942;--bad:#ff5c7a;--border:#1e2a52}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-snap-type:y mandatory;scroll-behavior:smooth;overflow-y:scroll;height:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
/* fixed control bar */
header{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(7,11,22,.92);
backdrop-filter:blur(8px);border-bottom:1px solid var(--border);
display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:10px 20px}
.brand{font-size:16px;font-weight:700;letter-spacing:.02em}
.brand .ai{color:var(--nse)} .brand .sub{color:var(--muted);font-weight:400;font-size:11px;letter-spacing:.05em}
.seg-ctl{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.seg-ctl .grp{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.seg-ctl button{background:transparent;color:var(--muted);border:0;padding:6px 11px;font-size:12px;cursor:pointer;font-family:inherit}
.seg-ctl button.on{background:var(--panel2);color:var(--text)}
#fresh{font-size:11px;color:var(--muted);width:100%;order:9}
/* pages */
main{scroll-snap-type:y mandatory}
section{min-height:100vh;scroll-snap-align:start;padding:86px 24px 30px;display:flex;flex-direction:column;justify-content:center;max-width:1200px;margin:0 auto}
.page-tag{font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
h2{font-size:26px;margin-bottom:2px} h2 .r{color:var(--muted);font-size:15px;font-weight:400}
.hero{display:grid;grid-template-columns:340px 1fr;gap:26px;align-items:center}
@media(max-width:820px){.hero{grid-template-columns:1fr}}
.bignum{font-size:64px;font-weight:800;line-height:1}
.delta{font-size:15px;margin-top:8px} .up{color:var(--nse)} .down{color:var(--bad)}
.metricval{font-size:14px;color:var(--muted);margin-top:10px}
.actionable{margin-top:16px;padding:12px 14px;border-left:3px solid var(--nse);background:var(--panel2);border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.5}
.actionable b{color:var(--nse)}
.chartbox{position:relative;height:300px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
/* overview */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:16px 0 22px}
@media(max-width:820px){.kpis{grid-template-columns:1fr 1fr}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.kpi .v{font-size:30px;font-weight:700;margin:6px 0 2px}
.kpi .d{font-size:12px}
.card.kpi{cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s}
.card.kpi:hover{transform:translateY(-3px);border-color:var(--nse);box-shadow:0 6px 20px rgba(34,229,138,.15)}
.card.kpi .go{font-size:10px;color:var(--nse);opacity:0;transition:opacity .15s;margin-top:6px}
.card.kpi:hover .go{opacity:1}
.chartbox{transition:border-color .15s} .chartbox:hover{border-color:var(--rival)}
.circ{display:grid;gap:8px;max-height:62vh;overflow-y:auto}
.circ a{display:block;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--warn);border-radius:0 8px 8px 0;padding:10px 13px;text-decoration:none;color:var(--text);font-size:13px;transition:border-color .15s,transform .1s}
.circ a:hover{border-left-color:var(--nse);transform:translateX(3px)}
.circ a .src{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.insights{display:grid;gap:10px}
.ins{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--rival);border-radius:0 10px 10px 0;padding:11px 14px}
.ins.high{border-left-color:var(--warn)}
.ins .h{font-size:13.5px;font-weight:600}
.ins .im{font-size:12.5px;color:var(--text);margin-top:3px}
.ins .re{font-size:12px;color:var(--muted);margin-top:3px}
.ins .ac{font-size:12.5px;margin-top:5px}.ins .ac b{color:var(--nse)}
.ins .nw a{font-size:11.5px;color:var(--rival);text-decoration:none;display:inline-block;margin-top:4px;margin-right:10px}
.hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:40;color:var(--muted);font-size:11px;background:rgba(14,23,48,.85);border:1px solid var(--border);border-radius:20px;padding:5px 14px}
a.mx{color:var(--nse);text-decoration:none;font-size:13px;border:1px solid var(--nse);border-radius:8px;padding:8px 14px;display:inline-block;margin-top:14px}
.dot{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column;gap:8px}
.dot a{width:8px;height:8px;border-radius:50%;background:var(--border);display:block}
.dot a.on{background:var(--nse)}
.empty{color:var(--muted);padding:20px 0}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="ai">NSE brAIn</span> agent <span class="sub">· Business Research AI Network</span></div>
  <div class="seg-ctl">
    <div class="grp" id="periodCtl">
      <button data-p="D">Daily</button><button data-p="W" class="on">Weekly</button>
      <button data-p="M">Monthly</button><button data-p="Y">Yearly</button>
    </div>
    <div class="grp" id="metricCtl">
      <button data-m="turnover" class="on">Turnover</button>
      <button data-m="adt">ADT</button>
      <button data-m="premium">Premium</button>
    </div>
  </div>
  <div id="fresh">loading…</div>
</header>

<main id="main"></main>
<div class="dot" id="dots"></div>
<div class="hint">scroll ↓ or ↑/↓ to page • click a card to jump · toggle period &amp; metric</div>

<script>
const SEGS=[
 {k:"cm",label:"Cash Market",rival:"BSE",nse:"nse_cm",riv:"bse_cm",opt:false},
 {k:"stk_fut",label:"Stock Futures",rival:"BSE",nse:"nse_stk_fut",riv:"bse_stk_fut",opt:false},
 {k:"idx_fut",label:"Index Futures",rival:"BSE",nse:"nse_idx_fut",riv:"bse_idx_fut",opt:false},
 {k:"fut",label:"Total Futures",rival:"BSE",nse:"nse_fut",riv:"bse_fut",opt:false},
 {k:"stk_optp",label:"Stock Options",rival:"BSE",nse:"nse_stk_optp",riv:"bse_stk_optp",opt:true},
 {k:"idx_optp",label:"Index Options",rival:"BSE",nse:"nse_idx_optp",riv:"bse_idx_optp",opt:true},
 {k:"optp",label:"Total Options",rival:"BSE",nse:"nse_optp",riv:"bse_optp",opt:true},
 {k:"fo",label:"Total F&O",rival:"BSE",nse:"nse_fo",riv:"bse_fo",opt:true},
];
const OVERVIEW=["cm","fut","optp","fo"];
const fmt=n=>n==null?"—":n.toLocaleString("en-IN",{maximumFractionDigits:n<100?2:0});
Chart.defaults.color="#8394bd";Chart.defaults.borderColor="#1e2a52";Chart.defaults.font.family="'Segoe UI',sans-serif";

let ROWS={},DAYS=[],INS=null,META=null,PERIOD="W",METRIC="turnover";
const charts={};

async function j(u){try{const r=await fetch(u+"?t="+Date.now());return r.ok?await r.json():null}catch(e){return null}}

function bucketKey(d){ // d = 'YYYY-MM-DD'
 if(PERIOD==="D")return d;
 if(PERIOD==="M")return d.slice(0,7);
 if(PERIOD==="Y")return d.slice(0,4);
 // weekly: ISO-ish week label YYYY-Www (Monday-based)
 const dt=new Date(d+"T00:00:00Z");const day=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-day);
 return dt.toISOString().slice(0,10);
}
function aggregate(){
 const buckets={};
 for(const d of DAYS){const m=ROWS[d];const bk=bucketKey(d);
  const b=buckets[bk]||(buckets[bk]={days:0,sum:{}});b.days++;
  for(const [key,val] of Object.entries(m)){if(typeof val==="number"&&!key.startsWith("share_"))b.sum[key]=(b.sum[key]||0)+val;}}
 return Object.keys(buckets).sort().map(bk=>({label:bk,...buckets[bk]}));
}
function segValue(sum,seg){ // ₹cr value for the current metric
 const t=sum[seg.nse]; if(t==null)return null;
 if(METRIC==="turnover")return t;
 if(METRIC==="premium")return seg.opt?t:t; // options already premium; futures/cm notional
 return null; // adt handled with days
}
function share(sum,seg){const n=sum[seg.nse],r=sum[seg.riv];return(n!=null&&r!=null&&n+r>0)?100*n/(n+r):null;}

function seriesFor(seg,buckets){
 return buckets.map(b=>({x:b.label,share:share(b.sum,seg),
   nse:b.sum[seg.nse]??null,riv:b.sum[seg.riv]??null,days:b.days}));
}
function metricValue(pt){
 if(pt.nse==null)return null;
 if(METRIC==="adt")return pt.nse/pt.days;
 return pt.nse; // turnover / premium
}
const metricLabel=()=>METRIC==="adt"?"ADT ₹cr/day":METRIC==="premium"?"Premium turnover ₹cr":"Turnover ₹cr";

function render(){
 const buckets=aggregate();
 const main=document.getElementById("main");main.innerHTML="";
 const dots=document.getElementById("dots");dots.innerHTML="";
 Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
 const lastB=buckets[buckets.length-1];
 const periodName={D:"trading day",W:"week",M:"month",Y:"year"}[PERIOD];

 // ---- Overview page
 const ov=document.createElement("section");ov.id="p_overview";
 ov.innerHTML=`<div class="page-tag">Overview · latest ${periodName}: ${lastB?lastB.label:"—"}</div>
  <h2>NSE competitive position <span class="r">— share % vs BSE / MCX</span></h2>
  <div class="kpis" id="kpis"></div>
  <div class="page-tag">AI actions · sorted by urgency · only segments needing action today</div>
  <div class="insights" id="insights"></div>`;
 main.appendChild(ov);
 const kEl=ov.querySelector("#kpis");
 for(const sk of OVERVIEW){const seg=SEGS.find(s=>s.k===sk);const ser=seriesFor(seg,buckets);
  const last=ser[ser.length-1],prev=ser[ser.length-2];
  const dv=(last&&prev&&last.share!=null&&prev.share!=null)?last.share-prev.share:null;
  const cls=dv==null?"":(dv>=0?"up":"down");const val=last?metricValue(last):null;
  kEl.insertAdjacentHTML("beforeend",`<div class="card kpi" data-seg="${sk}" title="Open ${seg.label}">
   <div class="lbl">${seg.label}</div>
   <div class="v" style="color:var(--nse)">${last&&last.share!=null?last.share.toFixed(2)+"%":"—"}</div>
   <div class="d ${cls}">${dv==null?"—":(dv>=0?"▲ +":"▼ ")+Math.abs(dv).toFixed(2)+"pp vs prev "+periodName}</div>
   <div class="metricval" style="font-size:11px">${metricLabel()}: ${fmt(val)}</div>
   <div class="go">open segment →</div></div>`);}
 kEl.addEventListener("click",e=>{const c=e.target.closest(".kpi");
   if(c&&c.dataset.seg)document.getElementById("p_"+c.dataset.seg)?.scrollIntoView({behavior:"smooth"});});
 // ---- platform & commodity tiles
 (function(){
  const lastD=DAYS[DAYS.length-1], prevD=DAYS[DAYS.length-2];
  const lr=ROWS[lastD]||{}, pr=ROWS[prevD]||{};
  const cxShare=(r,g)=>{const n=r.cx_nse?r.cx_nse[g]:null, m=r.cx_mcx?r.cx_mcx[g]:null; return (n!=null&&m!=null&&n+m>0)?100*n/(n+m):null;};
  const groups=[["crude","Crude Oil"],["natgas","Natural Gas"],["gold10g","Gold 10g"],["electricity","Electricity"]];
  for(const [g,label] of groups){
   const s=cxShare(lr,g), p=cxShare(pr,g);
   const dv=(s!=null&&p!=null)?s-p:null;
   const nv=lr.cx_nse?lr.cx_nse[g]:null;
   kEl.insertAdjacentHTML("beforeend",`<div class="card kpi" data-seg="com" title="Open Commodities">
    <div class="lbl">${label} · vs MCX</div>
    <div class="v" style="color:var(--nse)">${s!=null?s.toFixed(2)+"%":"—"}</div>
    <div class="d ${dv==null?"":(dv>=0?"up":"down")}">${dv==null?"latest day: "+(lastD||"—"):(dv>=0?"▲ +":"▼ ")+Math.abs(dv).toFixed(2)+"pp vs prev day"}</div>
    <div class="metricval" style="font-size:11px">NSE ₹cr: ${fmt(nv)}</div>
    <div class="go">open segment →</div></div>`);
  }
  const dp=window.DEBTP;
  if(dp){
   const rm=(dp.rfq&&dp.rfq.monthly)||[]; const lm=rm.length>1?rm[rm.length-2]:null, pm2=rm.length>2?rm[rm.length-3]:null;
   const dmo=(lm&&pm2)?100*(lm.value_cr/pm2.value_cr-1):null;
   const cbm=(dp.cbrics&&dp.cbrics.monthly)||[];
   kEl.insertAdjacentHTML("beforeend",`<div class="card kpi" data-seg="rfq" title="Open Debt RFQ">
    <div class="lbl">Debt · RFQ platform</div>
    <div class="v" style="color:var(--nse)">${lm?"₹"+fmt(lm.value_cr):"—"}</div>
    <div class="d ${dmo==null?"":(dmo>=0?"up":"down")}">${dmo==null?"—":(dmo>=0?"▲ +":"▼ ")+Math.abs(dmo).toFixed(1)+"% MoM"} · ${lm?lm.m:""}</div>
    <div class="metricval" style="font-size:11px">CBRICS ₹cr: ${cbm.length>1?fmt(cbm[cbm.length-2].value_cr):"—"}</div>
    <div class="go">open segment →</div></div>`);
   const sm=(dp.starmf||[]).filter(x=>x.days>=15); const l2=sm[sm.length-1], p2=sm[sm.length-2];
   const mmo=(l2&&p2)?100*(l2.value_cr/p2.value_cr-1):null;
   kEl.insertAdjacentHTML("beforeend",`<div class="card kpi" data-seg="mf" title="Open Mutual Funds">
    <div class="lbl">Mutual Funds · BSE StAR MF</div>
    <div class="v" style="color:var(--rival)">${mmo==null?"—":(mmo>=0?"+":"")+mmo.toFixed(1)+"%"}</div>
    <div class="d ${mmo!=null&&mmo>=0?"up":"down"}">MoM · ${l2?l2.month:""}</div>
    <div class="metricval" style="font-size:11px">value ₹cr: ${l2?fmt(l2.value_cr):"—"} · NSE NMF: n/a</div>
    <div class="go">open segment →</div></div>`);
   const eg=dp.egr||{};
   kEl.insertAdjacentHTML("beforeend",`<div class="card kpi" data-seg="egr" title="Open EGR">
    <div class="lbl">EGR · gold receipts</div>
    <div class="v" style="color:var(--nse)">${eg.turnover_crore?"₹"+fmt(eg.turnover_crore)+" cr":"₹0"}</div>
    <div class="d">as of ${eg.as_of||"—"}</div>
    <div class="metricval" style="font-size:11px">${eg.symbols||0} symbols · needs India-IP capture</div>
    <div class="go">open segment →</div></div>`);
  }
 })();
 renderInsights(ov.querySelector("#insights"));

 // ---- per-segment pages
 SEGS.forEach((seg,i)=>{
  const ser=seriesFor(seg,buckets);const last=ser[ser.length-1],prev=ser[ser.length-2];
  const dv=(last&&prev&&last.share!=null&&prev.share!=null)?last.share-prev.share:null;
  const val=last?metricValue(last):null;
  const ins=INS&&INS.insights?INS.insights.find(x=>x.segment===seg.k):null;
  const sec=document.createElement("section");sec.id="p_"+seg.k;
  sec.innerHTML=`<div class="page-tag">Segment ${i+1}/8 · ${periodName} view</div>
   <h2>${seg.label} <span class="r">— NSE share vs ${seg.rival}</span></h2>
   <div class="hero">
    <div>
      <div class="bignum" style="color:var(--nse)">${last&&last.share!=null?last.share.toFixed(2)+"%":"—"}</div>
      <div class="delta ${dv==null?"":(dv>=0?"up":"down")}">${dv==null?"no prior "+periodName:(dv>=0?"▲ +":"▼ ")+Math.abs(dv).toFixed(2)+"pp vs prev "+periodName}</div>
      <div class="metricval">${metricLabel()}: <b style="color:var(--text)">${fmt(val)}</b> · ${seg.rival}: ${fmt(last?last.riv:null)} ₹cr</div>
      <div class="actionable"><b>Action ›</b> ${ins?ins.actionable:"—"}</div>
      ${insDetail(ins)}
    </div>
    <div class="chartbox"><canvas id="c_${seg.k}"></canvas></div>
   </div>`;
  main.appendChild(sec);
  const ctx=sec.querySelector("#c_"+seg.k);
  charts[seg.k]=new Chart(ctx,{type:"line",data:{labels:ser.map(p=>p.x),
    datasets:[{label:"NSE share %",data:ser.map(p=>p.share),borderColor:"#22e58a",
     backgroundColor:"rgba(34,229,138,.14)",fill:true,tension:.25,spanGaps:true,pointRadius:0}]},
    options:{maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"NSE share: "+(c.raw==null?"—":c.raw.toFixed(2)+"%")}}},
     scales:{y:{title:{display:true,text:"NSE share %"}}}}});
 });

 // ---- commodities page
 const cx=document.createElement("section");cx.id="p_com";
 const comIns=INS&&INS.insights?INS.insights.find(x=>x.segment==="com"):null;
 cx.innerHTML=`<div class="page-tag">Segment · Commodities vs MCX</div>
  <h2>Commodity Derivatives <span class="r">— crude · natural gas · gold 10g · electricity</span></h2>
  <div class="actionable" style="max-width:640px"><b>Action ›</b> ${comIns?comIns.actionable:"Build depth in 1–2 contracts rather than spreading thin."}</div>
  <a class="mx" href="matrix.html">Open the full contract matrix →</a>`;
 main.appendChild(cx);

 // ---- debt platforms & MF pages (data: site/data/debt_platforms.json)
 const dp=window.DEBTP;
 if(dp&&dp.rfq){
  const rm=dp.rfq.monthly||[],cbm=(dp.cbrics&&dp.cbrics.monthly)||[];
  const lastM=rm.length>1?rm[rm.length-2]:(rm[rm.length-1]||null);
  const live=dp.rfq_live;
  const rs=document.createElement("section");rs.id="p_rfq";
  rs.innerHTML=`<div class="page-tag">Segment · Debt RFQ &amp; OBPP</div>
   <h2>Debt RFQ Platform <span class="r">— NSE monthly turnover ₹cr (CBRICS overlay)</span></h2>
   <div class="hero">
    <div>
     <div class="bignum" style="color:var(--nse)">${lastM?"₹"+fmt(lastM.value_cr):"—"}</div>
     <div class="delta">${lastM?lastM.m+" · "+fmt(lastM.trades)+" trades":""}</div>
     <div class="metricval">${live?"Last trading day ("+live.date+"): ₹"+fmt(live.turnover_crore)+" cr · "+fmt(live.trades)+" trades":""}</div>
     <div class="actionable"><b>Note ›</b> OBPP (sub-₹1 lakh) turnover is not derivable from the public feed — trades are reported per ISIN. Live capture needs an India IP.</div>
    </div>
    <div class="chartbox"><canvas id="c_rfq"></canvas></div>
   </div>`;
  main.appendChild(rs);
  charts.rfq=new Chart(rs.querySelector("#c_rfq"),{type:"line",data:{labels:rm.map(x=>x.m),
   datasets:[{label:"RFQ ₹cr",data:rm.map(x=>x.value_cr),borderColor:"#22e58a",backgroundColor:"rgba(34,229,138,.14)",fill:true,tension:.25,pointRadius:0},
    {label:"CBRICS ₹cr",data:cbm.map(x=>x.value_cr),borderColor:"#4f8ef7",tension:.25,pointRadius:0}]},
   options:{maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:true}}}});
 }
 if(dp&&dp.egr){
  const eg=dp.egr;
  const es=document.createElement("section");es.id="p_egr";
  es.innerHTML=`<div class="page-tag">Segment · EGR</div>
   <h2>Electronic Gold Receipts <span class="r">— NSE EGR turnover</span></h2>
   <div class="bignum" style="color:var(--nse)">${eg.turnover_crore?"₹"+fmt(eg.turnover_crore)+" cr":"—"}</div>
   <div class="metricval">as of ${eg.as_of||"—"} · ${eg.symbols||0} gold symbols</div>
   <div class="actionable" style="max-width:640px"><b>Status ›</b> ${eg.note||""}</div>`;
  main.appendChild(es);
 }
 if(dp&&dp.starmf&&dp.starmf.length){
  const sm=dp.starmf.filter(x=>x.days>=15);
  const lm=sm[sm.length-1],pm=sm[sm.length-2];
  const mom=(lm&&pm)?100*(lm.value_cr/pm.value_cr-1):null;
  const subPct=lm?100*lm.subscription_cr/(lm.subscription_cr+lm.redemption_cr):null;
  const momSeries=sm.map((x,i2)=>i2?100*(x.value_cr/sm[i2-1].value_cr-1):null);
  const lp=dp.nmf_last_public;
  const ms=document.createElement("section");ms.id="p_mf";
  ms.innerHTML=`<div class="page-tag">Segment · Mutual Funds (exchange platforms) · monthly · in %</div>
   <h2>Mutual Funds <span class="r">— NSE vs BSE exchange platforms</span></h2>
   <div class="hero">
    <div>
     <div class="bignum" style="color:var(--rival)">${mom==null?"—":(mom>=0?"+":"")+mom.toFixed(1)+"%"}</div>
     <div class="delta ${mom!=null&&mom>=0?"up":"down"}">BSE StAR MF value, ${lm?lm.month:""} vs prev month</div>
     <div class="metricval">${lm?lm.month+": ₹"+fmt(lm.value_cr)+" cr · "+fmt(lm.orders)+" orders · subscription "+subPct.toFixed(1)+"% / redemption "+(100-subPct).toFixed(1)+"%":""}</div>
     <div class="actionable"><b>NSE vs BSE ›</b> ${lp?"NSE NMF II publishes no monthly numbers; last public split ("+lp.fy+"): NSE ₹"+fmt(lp.nse_cr)+" cr vs BSE ₹"+fmt(lp.bse_cr)+" cr → NSE ≈ "+lp.nse_share_pct+"% of exchange-routed MF value.":(dp.nmf_note||"")}</div>
    </div>
    <div class="chartbox"><canvas id="c_mf"></canvas></div>
   </div>`;
  main.appendChild(ms);
  charts.mf=new Chart(ms.querySelector("#c_mf"),{data:{labels:sm.map(x=>x.month),
   datasets:[{type:"bar",label:"StAR MF value ₹cr",data:sm.map(x=>x.value_cr),backgroundColor:"rgba(79,142,247,.5)",borderColor:"#4f8ef7",borderWidth:1,yAxisID:"y"},
    {type:"line",label:"MoM %",data:momSeries,borderColor:"#22e58a",tension:.25,yAxisID:"y2"}]},
   options:{maintainAspectRatio:false,plugins:{legend:{display:true}},scales:{y:{position:"left"},y2:{position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"MoM %"}}}}});
 }

 // ---- circulars page
 const cc=document.createElement("section");cc.id="p_circulars";
 const circs=(INS&&INS.circulars)?INS.circulars:[];
 cc.innerHTML=`<div class="page-tag">Regulatory · circulars &amp; notices</div>
  <h2>Circulars &amp; Regulatory Updates <span class="r">— NSE · BSE · sebi</span></h2>
  <div class="circ" id="circList"></div>`;
 main.appendChild(cc);
 const cl=cc.querySelector("#circList");
 if(circs.length){
   for(const c of circs.slice(0,40))
     cl.insertAdjacentHTML("beforeend",`<a href="${c.link}" target="_blank" rel="noopener">${c.title}<div class="src">${c.source}${c.date?" · "+c.date.replace(/\s\d{2}:\d{2}:\d{2}.*/,""):""}</div></a>`);
 } else { cl.innerHTML='<div class="empty">Circulars arrive with the next pipeline run.</div>'; }

 // ---- nav dots + snap observer
 const pages=[...main.querySelectorAll("section")];
 pages.forEach(p=>{const a=document.createElement("a");a.href="#"+p.id;dots.appendChild(a);});
 const dotEls=[...dots.querySelectorAll("a")];
 const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){
   const idx=pages.indexOf(e.target);dotEls.forEach((d,i)=>d.classList.toggle("on",i===idx));}}),{threshold:.5});
 pages.forEach(p=>io.observe(p));
}

function insDetail(i){if(!i)return "";const nw=(i.news||[]).map(n=>`<a href="${n.link}" target="_blank" rel="noopener">📰 ${n.title}</a>`).join("");
 return `<div class="ins ${i.severity||""}" style="margin-top:10px"><div class="h">${i.headline}</div><div class="im">${i.impact}</div><div class="re">Why: ${i.reason}</div><div class="nw">${nw}</div></div>`;}

function renderInsights(el){
 if(!INS||!INS.insights||!INS.insights.length){el.innerHTML='<div class="empty">Insights arrive with the next pipeline run.</div>';return;}
 el.innerHTML="";
 const rank={high:0,warn:1,medium:1,normal:2,low:3};
 const urgent=INS.insights.slice().sort((a,b)=>(rank[a.severity]??2)-(rank[b.severity]??2)).filter(x=>(rank[x.severity]??2)<2);
 if(!urgent.length){el.innerHTML='<div class="empty">No segment needs management action today — all shares steady. Details live in each segment screen.</div>';return;}
 for(const i of urgent){
  el.insertAdjacentHTML("beforeend",`<div class="ins ${i.severity}">
   <div class="ac"><b>Action ›</b> ${i.actionable} <span style="color:var(--muted);font-size:11px">· ${(i.segment||"").toUpperCase()} · ${i.severity==="high"?"URGENT":"watch"}</span></div></div>`);
 }
}

document.getElementById("periodCtl").addEventListener("click",e=>{
 if(!e.target.dataset.p)return;PERIOD=e.target.dataset.p;
 [...e.currentTarget.children].forEach(b=>b.classList.toggle("on",b===e.target));render();});
document.getElementById("metricCtl").addEventListener("click",e=>{
 if(!e.target.dataset.m)return;METRIC=e.target.dataset.m;
 [...e.currentTarget.children].forEach(b=>b.classList.toggle("on",b===e.target));render();});

// keyboard paging between screens (↑/↓ · PageUp/PageDown)
document.addEventListener("keydown",e=>{
 if(!["ArrowDown","ArrowUp","PageDown","PageUp"].includes(e.key))return;
 const pages=[...document.querySelectorAll("main section")];
 const mid=window.innerHeight/2;
 let cur=pages.findIndex(p=>{const r=p.getBoundingClientRect();return r.top<=mid&&r.bottom>=mid;});
 if(cur<0)cur=0;
 const next=(e.key==="ArrowDown"||e.key==="PageDown")?cur+1:cur-1;
 if(next>=0&&next<pages.length){e.preventDefault();pages[next].scrollIntoView({behavior:"smooth"});}
});

 const daily=await j("data/daily.json");INS=await j("data/insights.json");META=await j("data/meta.json");window.DEBTP=await j("data/debt_platforms.json");
 ROWS=daily?daily.rows:{};DAYS=Object.keys(ROWS).sort();
 if(META){document.getElementById("fresh").textContent=
   `latest trading day: ${META.last_trading_day||"—"} · updated ${META.updated_utc||"—"}`+(META.sample_data?" · ⚠ synthetic preview data":"");}
 render();
})();
</script>
